version: 2.1

orbs:
  node: circleci/node@5.1.0

jobs:
  build-and-test:
    docker:
      - image: cimg/node:22.13.1
    steps:
      - checkout
      - run:
          name: "Install Dependencies"
          command: npm ci
      - run:
          name: "Build Project"
          command: npm run build
      - persist_to_workspace:
          root: ~/project
          paths:
            - build

  deploy:
    docker:
      - image: cimg/base:2023.09
    steps:
      - attach_workspace:
          at: ~/project
      - run:
          name: "Install rsync"
          command: sudo apt-get update && sudo apt-get install -y rsync
      - add_ssh_keys:
          fingerprints:
            - "SHA256:zZGf4Xb/l6SnQ8l8RlgiXg9TjZDYAAHpi8GvkZN+3zA"
      - run:
          name: "Add VPS to known_hosts"
          command: ssh-keyscan 31.220.100.187 >> ~/.ssh/known_hosts

      - run:
          name: "Deploy using rsync"
          # Agregamos '/' al final de build para que rsync copie el CONTENIDO, no la carpeta
          command: rsync -avz --delete ~/project/build/ circleci@31.220.100.187:/var/www/website-findSmart/build/

      - run:
          name: "Restart or Start Service"
          command: |
            # Definimos la ruta de PM2 para evitar errores de PATH
            export PM2_PATH=/home/circleci/.nvm/versions/node/v22.22.1/bin/pm2
            ssh circleci@31.220.100.187 "
              $PM2_PATH restart findSmart-web || \
              $PM2_PATH serve /var/www/website-findSmart/build/client 3000 --name 'findSmart-web' --spa && \
              $PM2_PATH save
            "

workflows:
  test-build-deploy:
    jobs:
      - build-and-test
      - deploy:
          requires:
            - build-and-test
          filters:
            branches:
              only: master
