version: 2.1

orbs:
  node: circleci/node@5.1.0

jobs:
  build-and-test:
    docker:
      - image: cimg/node:22.13.1
    steps:
      - checkout
      - run:
          name: "Install Dependencies"
          command: npm ci
      - run:
          name: "Build Project"
          command: npm run build

      # Verificamos qué carpetas se crearon (útil para debug si vuelve a fallar)
      - run:
          name: "List files for debug"
          command: ls -R

      # CAMBIO AQUÍ: React Router v7 usa la carpeta 'build'
      - persist_to_workspace:
          root: ~/project
          paths:
            - build

  deploy:
    docker:
      - image: cimg/base:2023.09
    steps:
      - attach_workspace:
          at: ~/project

      - add_ssh_keys:
          fingerprints:
            - "SHA256:zZGf4Xb/l6SnQ8l8RlgiXg9TjZDYAAHpi8GvkZN+3zA"

      - run:
          name: "Add VPS to known_hosts"
          command: ssh-keyscan $IP >> ~/.ssh/known_hosts

      # CAMBIO AQUÍ: Enviamos 'build/' en lugar de 'dist/'
      - run:
          name: "Deploy using rsync"
          command: rsync -avz --delete ~/project/build/ $USER@$IP:/var/www/website-findSmart/build/

      # CAMBIO AQUÍ: Si es una SPA, PM2 debe servir la subcarpeta 'client' dentro de 'build'
      - run:
          name: "Restart Service"
          command: ssh $USER@$IP 'source ~/.bashrc && pm2 restart findSmart-web'

workflows:
  test-build-deploy:
    jobs:
      - build-and-test
      - deploy:
          requires:
            - build-and-test
          filters:
            branches:
              only: master
