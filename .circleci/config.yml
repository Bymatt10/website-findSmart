version: 2.1

orbs:
  node: circleci/node@5.1.0

jobs:
  build-and-test:
    docker:
      - image: cimg/node:20.11.1
    steps:
      - checkout
      - run:
          name: "Install Dependencies"
          command: npm ci
          working_directory: ~/project/web
      - run:
          name: "Run Tests"
          command: npm run test
          working_directory: ~/project/web
      - run:
          name: "Build Project"
          command: npm run build
          working_directory: ~/project/web

      # Guardamos la carpeta 'web' con los archivos compilados para usarla en el siguiente job
      - persist_to_workspace:
          root: ~/project
          paths:
            - web

  deploy:
    docker:
      # Usamos una imagen base ligera que ya trae SSH y rsync instalados
      - image: cimg/base:2023.09
    steps:
      # Recuperamos los archivos que construimos en el job anterior
      - attach_workspace:
          at: ~/project

      # --- AQUI ESTA EL UNICO CAMBIO QUE DEBES HACER ---
      - add_ssh_keys:
          fingerprints:
            - "SHA256:zZGf4Xb/l6SnQ8l8RlgiXg9TjZDYAAHpi8GvkZN+3zA"

      # Registramos tu VPS para que no pida confirmación manual
      - run:
          name: "Add VPS to known_hosts"
          command: ssh-keyscan $IP >> ~/.ssh/known_hosts

      # Copiamos la carpeta dist/ directo a la ruta que creamos en tu VPS
      - run:
          name: "Deploy using rsync"
          command: rsync -avz --delete ~/project/web/dist/ $USER@$IP:/var/www/website-findSmart/web/

      # Reiniciamos la app usando PM2
      - run:
          name: "Restart Service"
          command: ssh $USER@$IP 'source ~/.bashrc && pm2 restart findSmart-web'

workflows:
  test-build-deploy:
    jobs:
      - build-and-test
      - deploy:
          requires:
            - build-and-test # El despliegue espera a que el build pase sin errores
          filters:
            branches:
              only: main # Opcional pero recomendado: solo despliega cuando haces push a la rama 'main'
